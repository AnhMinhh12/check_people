<!-- HISTORY CONTENT COMPONENT -->
<div id="tab-history" class="tab-content space-y-12 animate-fadeIn max-w-[1400px] mx-auto">
    <div class="flex flex-col lg:flex-row justify-between gap-10 border-b border-slate-100 pb-12">
        <div class="space-y-2">
            <h2 class="text-4xl font-black italic tracking-tighter text-slate-800 uppercase font-headline">Incident Evidence <span class="text-danger not-italic tracking-[0.2em]">LOGS</span></h2>
            <p class="text-[10px] text-slate-400 font-extrabold uppercase tracking-[0.3em]">Historical repository of all detected security breaches</p>
        </div>
        <div class="relative w-full lg:w-[320px] group">
            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-danger font-bold text-lg select-none">
                <span class="material-symbols-outlined">filter_list</span>
            </div>
            <select id="history-cam-select" onchange="loadHistory()"
                class="w-full h-16 bg-white border border-slate-100 rounded-[2.5rem] text-[10px] font-black text-slate-700 uppercase pl-16 pr-10 focus:ring-4 focus:ring-danger/10 shadow-2xl transition-all appearance-none cursor-pointer">
                <option value="">Global System Reports (All)</option>
                {% for cam in cameras %}<option value="{{ cam.id }}">{{ cam.name }}</option>{% endfor %}
            </select>
            <span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none group-hover:text-danger transition-colors">expand_more</span>
        </div>
    </div>

    <div class="bg-white rounded-[4rem] shadow-5xl border border-slate-50 overflow-hidden relative group">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-[10px] uppercase font-black tracking-widest text-slate-400">
                        <th class="px-12 py-8 border-b border-slate-100 italic">Device Designation</th>
                        <th class="px-12 py-8 border-b border-slate-100">Security ID</th>
                        <th class="px-12 py-8 border-b border-slate-100 font-mono">Timestamp Correlation</th>
                        <th class="px-12 py-8 border-b border-slate-100">Engagement Dur.</th>
                        <th class="px-12 py-8 border-b border-slate-100 text-center">Visual Persistence</th>
                        <th class="px-12 py-8 border-b border-slate-100"></th>
                    </tr>
                </thead>
                <tbody id="history-table" class="divide-y divide-slate-50 text-[13px] font-medium text-slate-600">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
        
        <div id="history-empty" class="hidden p-32 text-center flex flex-col items-center">
            <div class="h-20 w-20 bg-slate-50 rounded-full flex items-center justify-center text-slate-200 mb-6">
                <span class="material-symbols-outlined text-4xl">inventory_2</span>
            </div>
            <p class="text-xs font-black uppercase text-slate-400 tracking-widest leading-none mb-2">No Incident Correlation Found</p>
            <p class="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Global Security Status: PASSING</p>
        </div>
    </div>
</div>
