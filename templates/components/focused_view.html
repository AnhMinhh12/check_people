<!-- FOCUSED VIEW COMPONENT -->
<div id="focused-view" class="hidden animate-fadeIn space-y-12">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
        <!-- Main Feed Section -->
        <div class="lg:col-span-8 space-y-8">
            <div class="relative aspect-video bg-slate-900 rounded-[4rem] overflow-hidden shadow-5xl border-[10px] border-white group">
                <img id="video-feed" src="" class="w-full h-full object-contain" alt="Live Feed" />
                <canvas id="dashboard-canvas" class="absolute top-0 left-0 w-full h-full pointer-events-none"></canvas>
                
                <div class="absolute top-10 left-10 flex gap-4 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                    <span class="px-5 py-3 bg-white/20 backdrop-blur-xl rounded-2xl text-[10px] font-black text-white border border-white/20 uppercase tracking-widest shadow-2xl">
                        NGUỒN AI: <span id="active-cam-id" class="text-primary">CAM-00</span>
                    </span>
                </div>
            </div>
            
            <div class="flex flex-col sm:flex-row justify-between items-center bg-white p-8 rounded-[3.5rem] shadow-2xl border border-slate-50 gap-6">
                <div class="flex gap-4 w-full sm:w-auto">
                    <button onclick="toggleROIConfig()"
                        class="flex-1 sm:flex-none px-8 py-4 bg-primary/10 text-primary rounded-3xl text-xs font-black uppercase tracking-widest border border-primary/20 hover:bg-primary/20 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <span class="material-symbols-outlined text-sm font-bold">edit_square</span> Cấu hình Vùng
                    </button>
                    <button onclick="closeFocusView()"
                        class="flex-1 sm:flex-none px-8 py-4 bg-slate-100/50 text-slate-500 rounded-3xl text-xs font-black uppercase tracking-widest border border-slate-100 hover:bg-slate-200 transition-all flex items-center justify-center gap-3 active:scale-95">
                        <span class="material-symbols-outlined text-sm font-bold">arrow_back</span> Thoát
                    </button>
                </div>
                
                <div class="flex items-center gap-12 w-full sm:w-auto justify-center sm:justify-end">
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Tốc độ xử lý</p>
                        <div class="flex items-baseline gap-1.5 justify-end">
                            <p id="fps-display" class="text-2xl font-bold text-slate-800 font-headline leading-none">0.0</p>
                            <span class="text-[10px] font-bold text-slate-400">FPS</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 leading-none">Phát hiện an toàn</p>
                        <div class="flex items-baseline gap-1.5 justify-end">
                            <p id="worker-count" class="text-2xl font-black text-primary font-headline leading-none">0</p>
                            <span class="text-[10px] font-bold text-slate-400">NGƯỜI</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Sidebar Monitoring Section -->
        <div class="lg:col-span-4 space-y-10">
            <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border border-slate-50 relative overflow-hidden group">
                <div class="absolute -right-20 -top-20 h-40 w-40 bg-slate-50 rounded-full group-hover:scale-150 transition-all duration-1000"></div>
                <div class="relative z-10">
                    <p class="text-[10px] font-bold tracking-wider text-slate-400 uppercase mb-5 leading-none">Đơn vị xử lý Logic giám sát</p>
                    <h3 id="status-display" class="text-3xl font-extrabold text-slate-800 font-headline leading-none uppercase border-l-[6px] pl-6 border-slate-800 tracking-tight">
                        ĐANG KHỞI TẠO
                    </h3>
                    
                    <div class="mt-12 space-y-3">
                        <div class="flex justify-between items-end px-1">
                            <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Tiến trình vi phạm</p>
                            <p id="missing-time" class="text-xs font-black text-danger font-headline leading-none">0.0s</p>
                        </div>
                        <div class="h-3 w-full bg-slate-100 rounded-full overflow-hidden border border-slate-100">
                            <div id="time-bar" class="bg-primary h-full w-0 transition-all duration-300 shadow-[0_0_15px_rgba(59,130,246,0.3)]"></div>
                        </div>
                        <div class="flex justify-end pt-1">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Ngưỡng báo động: <span id="threshold-label" class="text-slate-600 font-black">--s</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ROI CONFIG PANEL -->
            <div id="roi-config-panel" class="hidden bg-white p-8 rounded-[3.5rem] shadow-5xl border-4 border-primary/20 relative animate-fadeIn">
                <div class="flex items-center gap-3 mb-6">
                    <div class="h-8 w-8 bg-primary rounded-xl flex items-center justify-center text-white text-sm shadow-md">
                        <span class="material-symbols-outlined">polyline</span>
                    </div>
                    <h3 class="text-xs font-black uppercase text-slate-800 tracking-tighter">Giao thức xác định vùng</h3>
                </div>
                
                <div class="relative bg-slate-900 rounded-3xl overflow-hidden aspect-video border-[6px] border-slate-50 shadow-inner group">
                    <img id="roi-bg" src="" class="w-full h-full object-contain opacity-50 group-hover:opacity-70 transition-opacity duration-500" alt="ROI Background" />
                    <canvas id="roi-canvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair z-20"></canvas>
                </div>
                
                <div class="mt-8 flex gap-4">
                    <button onclick="saveROI()" class="flex-1 py-4 bg-primary text-white text-[10px] font-black uppercase tracking-widest rounded-3xl shadow-xl shadow-primary/20 hover:brightness-110 active:scale-95 transition-all">
                        LƯU CẤU HÌNH
                    </button>
                    <button onclick="clearROI()" class="flex-1 py-4 bg-slate-100 text-slate-500 text-[10px] font-black uppercase tracking-widest rounded-3xl hover:bg-slate-200 transition-all active:scale-95">
                        XÓA HẾT
                    </button>
                </div>
                <div class="mt-4 px-2">
                    <p class="text-[8px] text-slate-400 font-bold text-center leading-relaxed">Nhấp chuột vào khung hình trên để xác định vùng an toàn. Nhấn chuột phải để hoàn tác điểm cuối.</p>
                </div>
            </div>
        </div>
    </div>
</div>
