<!-- ANALYSIS CONTENT COMPONENT -->
<div id="tab-analysis" class="tab-content space-y-12 animate-fadeIn max-w-[1400px] mx-auto">
    <div class="flex flex-col lg:flex-row justify-between gap-10 border-b border-slate-100 pb-12">
        <div class="space-y-2">
            <h2 class="text-4xl font-black italic tracking-tighter text-slate-800 uppercase font-headline">Intelligence Reports <span class="text-primary not-italic tracking-[0.2em]">05</span></h2>
            <p class="text-[10px] text-slate-400 font-extrabold uppercase tracking-[0.3em]">Operational performance metric analysis per device</p>
        </div>
        <div class="relative w-full lg:w-[320px] group">
            <div class="absolute left-6 top-1/2 -translate-y-1/2 text-primary font-bold text-lg select-none">
                <span class="material-symbols-outlined">filter_drama</span>
            </div>
            <select id="analysis-cam-select" onchange="updateAnalysis()"
                class="w-full h-16 bg-white border border-slate-100 rounded-[2.5rem] text-[10px] font-black text-slate-700 uppercase pl-16 pr-10 focus:ring-4 focus:ring-primary/10 shadow-2xl transition-all appearance-none cursor-pointer">
                <option value="">Global System Reports (All)</option>
                {% for cam in cameras %}<option value="{{ cam.id }}">{{ cam.name }}</option>{% endfor %}
            </select>
            <span class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-slate-300 pointer-events-none group-hover:text-primary transition-colors">expand_more</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border-b-8 border-secondary/20 transition-transform hover:scale-[1.03] duration-500 flex flex-col justify-between h-64">
            <div class="h-14 w-14 bg-secondary/5 text-secondary rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                <span class="material-symbols-outlined text-2xl font-bold">trending_up</span>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 font-body">Deployment Safety Rate</p>
                <div id="analytics-uptime" class="text-5xl font-black text-slate-800 font-headline italic tracking-tighter uppercase">98.2%</div>
            </div>
        </div>
        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border-b-8 border-danger/20 transition-transform hover:scale-[1.03] duration-500 flex flex-col justify-between h-64">
             <div class="h-14 w-14 bg-danger/5 text-danger rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                <span class="material-symbols-outlined text-2xl font-bold">timer</span>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 font-body">Global Displacement Time</p>
                <div id="analytics-duration" class="text-5xl font-black text-slate-800 font-headline italic tracking-tighter uppercase">--m</div>
            </div>
        </div>
        <div class="bg-white p-10 rounded-[3.5rem] shadow-2xl border-b-8 border-accent/20 transition-transform hover:scale-[1.03] duration-500 flex flex-col justify-between h-64">
             <div class="h-14 w-14 bg-accent/5 text-accent rounded-2xl flex items-center justify-center mb-6 shadow-inner">
                <span class="material-symbols-outlined text-2xl font-bold">report_problem</span>
            </div>
            <div>
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1 font-body">Total Breach Event Logged</p>
                <div id="analytics-count" class="text-5xl font-black text-slate-800 font-headline italic tracking-tighter uppercase">--</div>
            </div>
        </div>
    </div>

    <div class="bg-white p-12 rounded-[5rem] shadow-5xl border border-slate-50 relative overflow-hidden group">
        <div class="absolute -right-40 -top-40 h-80 w-80 bg-slate-50 rounded-full group-hover:scale-125 transition-all duration-[2000ms]"></div>
        <div class="relative z-10 space-y-8">
            <div class="flex justify-between items-center px-4">
                <h3 class="text-xl font-black text-slate-800 font-headline uppercase leading-none italic">Temporal Analysis Distribution</h3>
                <div class="flex gap-4">
                    <span class="flex items-center gap-2 text-[10px] font-black text-slate-400 uppercase tracking-widest"><span class="h-3 w-3 bg-primary rounded-full"></span> Breaches</span>
                </div>
            </div>
            <div class="h-[500px]">
                <canvas id="analysis-chart"></canvas>
            </div>
        </div>
    </div>
</div>
