<!-- DASHBOARD GRID VIEW -->
<div id="grid-view" class="space-y-10 animate-fadeIn">
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-6 px-4">
        <div class="space-y-1">
            <h1 class="text-3xl font-extrabold text-slate-800 font-headline uppercase leading-none tracking-tight">Giám sát <span class="text-primary font-extrabold">AI Real-time</span></h1>
        </div>
        <div class="mt-2 ml-1 hidden lg:block">
            <p class="text-[10px] font-bold uppercase tracking-wider text-slate-400">Phiên bản Doanh nghiệp v5.0</p>
        </div>
        <div class="flex items-center gap-3 w-full lg:w-auto">
            <div class="relative w-full lg:w-96">
                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-lg">search</span>
                <input type="text" placeholder="Tìm kiếm thiết bị hoặc khu vực..."
                    class="w-full bg-white border border-slate-100 rounded-2xl text-xs pl-12 pr-6 py-4 focus:ring-4 focus:ring-primary/10 focus:border-primary transition-all shadow-sm">
            </div>
            <button class="h-12 w-12 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center hover:bg-slate-50 transition-all text-slate-400 hover:text-primary">
                <span class="material-symbols-outlined">filter_list</span>
            </button>
        </div>
    </div>
    
    <div id="camera-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        {% for cam in cameras %}
        <div data-id="{{ cam.id }}" data-name="{{ cam.name }}"
            onclick="focusCamera(this.dataset.id, this.dataset.name)"
            class="camera-card group relative bg-white p-8 rounded-[3rem] shadow-xl shadow-slate-200/50 flex flex-col justify-between h-[340px] overflow-hidden cursor-pointer">
            
            <div class="absolute -right-16 -top-16 h-48 w-48 bg-slate-50 rounded-full group-hover:bg-primary/5 transition-all duration-700 -z-0"></div>
            
            <div class="relative z-10 flex flex-col h-full">
                <div class="flex justify-between items-start mb-6">
                    <div class="h-14 w-14 bg-slate-50 rounded-[1.5rem] flex items-center justify-center text-slate-400 group-hover:text-primary transition-all duration-500 shadow-inner">
                        <span class="material-symbols-outlined text-2xl font-bold">videocam</span>
                    </div>
                    <div id="grid-status-{{ cam.id }}" class="px-4 py-1.5 text-[9px] font-black rounded-full border bg-slate-50 border-slate-100 text-slate-400 transition-all shadow-sm">
                        ĐANG KHỞI TẠO
                    </div>
                </div>
                
                <div class="mt-4 flex flex-col flex-1">
                    <p class="text-[10px] font-bold tracking-wider text-slate-400 uppercase mb-5 leading-none">Đơn vị xử lý Logic giám sát</p>
                    <h3 id="status-display" class="text-3xl font-extrabold text-slate-800 font-headline leading-none uppercase border-l-[6px] pl-6 border-slate-800 tracking-tight">
                        {{ cam.name }}
                    </h3>
                    <p class="text-[10px] text-slate-400 uppercase font-bold mt-2 tracking-wider">{{ cam.group }}</p>
                </div>

                <div class="mt-auto pt-6 border-t border-slate-50 flex justify-between items-end">
                    <div class="space-y-1">
                        <p class="text-[9px] text-slate-400 uppercase font-black leading-none">Số người phát hiện</p>
                        <div class="flex items-baseline gap-1.5">
                            <p id="grid-count-{{ cam.id }}" class="text-3xl font-black text-slate-800 font-headline leading-none">0</p>
                            <span class="text-[9px] font-bold text-slate-400">NGƯỜI</span>
                        </div>
                    </div>
                    <div class="text-right">
                        <span id="grid-label-{{ cam.id }}" class="px-4 py-2 bg-secondary/10 text-secondary rounded-2xl text-[9px] font-black uppercase tracking-widest border border-secondary/10 shadow-sm animate-pulse">
                            ĐANG QUÉT
                        </span>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
