<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Warden AI | Sentinel Security</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { "primary": "#ffb693", "tertiary": "#00daf3", "error": "#ffb4ab", "background": "#0a0e14", "surface": "#10141a", "surface-container": "#1c2026" },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Inter"] }
                }
            }
        }
    </script>
    <style>
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .violation-hud { display: none; position: fixed; inset: 0; background: radial-gradient(circle, transparent 20%, rgba(127, 29, 29, 0.3) 100%); border: 12px solid #dc2626; z-index: 9999; pointer-events: none; }
        .no-signal-overlay { display: none; position: absolute; inset: 0; background: #050505; z-index: 20; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-background text-[#dfe2eb] font-body selection:bg-tertiary/30">
    <aside class="h-screen w-64 left-0 fixed bg-surface flex flex-col py-6 border-r border-white/5 z-50">
        <div class="px-6 mb-10">
            <h1 class="text-xl font-extrabold text-white font-headline tracking-tighter">WARDEN AI</h1>
            <p class="text-[10px] uppercase tracking-[0.2em] text-tertiary font-bold opacity-80">Security v3.5</p>
        </div>
        <nav class="flex-1 space-y-1">
            <button onclick="showTab('dashboard')" id="nav-dashboard" class="w-full px-6 py-4 text-primary bg-surface-container border-l-4 border-primary flex items-center transition-all">
                <span class="material-symbols-outlined mr-3 text-xl">grid_view</span>
                <span class="text-sm font-bold tracking-tight">Giám Sát</span>
            </button>
            <button onclick="showTab('history')" id="nav-history" class="w-full px-6 py-4 text-slate-500 hover:bg-surface-container/30 border-l-4 border-transparent flex items-center transition-all">
                <span class="material-symbols-outlined mr-3 text-xl">receipt_long</span>
                <span class="text-sm font-bold tracking-tight">Lịch Sử</span>
            </button>
            <button onclick="showTab('config')" id="nav-config" class="w-full px-6 py-4 text-slate-500 hover:bg-surface-container/30 border-l-4 border-transparent flex items-center transition-all">
                <span class="material-symbols-outlined mr-3 text-xl">architecture</span>
                <span class="text-sm font-bold tracking-tight">Cấu Hình</span>
            </button>
        </nav>
    </aside>

    <main class="ml-64 min-h-screen">
        <header class="w-full sticky top-0 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-10 py-6 border-b border-white/5 z-40">
            <span id="tab-title" class="text-xl font-black uppercase tracking-widest text-white font-headline">Giám Sát</span>
            <div class="flex items-center gap-3 px-4 py-2 bg-surface-container rounded-full border border-white/5">
                <span id="status-dot" class="inline-flex rounded-full h-3 w-3 bg-tertiary"></span>
                <span id="status-text" class="text-[10px] font-black uppercase tracking-widest text-tertiary">Hệ Thống Trực Tuyến</span>
            </div>
        </header>

        <!-- DASHBOARD -->
        <div id="tab-dashboard" class="tab-content active p-10 max-w-7xl mx-auto space-y-8">
            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-surface p-8 border-b-4 border-tertiary rounded-2xl">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Người Trong Vùng</span>
                    <h2 id="worker-count" class="text-6xl font-headline font-black text-white mt-1">0</h2>
                </div>
                <div id="status-card" class="bg-surface p-8 border-b-4 border-slate-700 rounded-2xl">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">Giám Sát AI</span>
                    <h2 id="status-display" class="text-4xl font-headline font-black text-white mt-2 uppercase italic tracking-tighter">ĐANG CHỜ</h2>
                </div>
                <div class="bg-surface p-8 border-b-4 border-primary rounded-2xl">
                    <span class="text-[10px] font-bold uppercase tracking-widest text-slate-500">FPS AI</span>
                    <h2 id="fps-display" class="text-6xl font-headline font-black text-white mt-1">0.0</h2>
                </div>
            </section>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                <section class="lg:col-span-8">
                    <div class="relative aspect-video bg-black rounded-3xl overflow-hidden border border-white/5 shadow-2xl">
                        <img id="video-feed" src="" class="w-full h-full object-contain" />
                        <div id="no-signal" class="no-signal-overlay flex flex-col items-center justify-center">
                            <span class="material-symbols-outlined text-8xl text-red-500 mb-4">signal_disconnected</span>
                            <h2 class="text-2xl font-black text-white uppercase tracking-widest">MẤT TÍN HIỆU</h2>
                        </div>
                    </div>
                </section>
                <section class="lg:col-span-4 space-y-6">
                    <div class="bg-surface p-8 rounded-3xl border border-white/5">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-slate-500 mb-6">Tiến Độ Vi Phạm</h3>
                        <div class="h-4 w-full bg-black/50 rounded-full overflow-hidden mb-4">
                            <div id="time-bar" class="bg-red-500 h-full w-0 transition-all duration-500"></div>
                        </div>
                        <div class="flex justify-between items-center">
                            <span id="missing-time" class="text-2xl font-headline font-black text-red-500">0.0s</span>
                            <span class="text-[10px] font-black text-slate-500 uppercase">Ngưỡng: 5s</span>
                        </div>
                    </div>
                    <div class="bg-surface p-8 rounded-3xl border border-white/5">
                        <h3 class="text-xs font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                            <span class="material-symbols-outlined text-tertiary">terminal</span> Nhật Ký
                        </h3>
                        <div id="log-container" class="space-y-2 font-mono text-[10px] h-48 overflow-y-auto"></div>
                    </div>
                </section>
            </div>
        </div>

        <!-- HISTORY -->
        <div id="tab-history" class="tab-content p-10 max-w-7xl mx-auto">
            <div class="bg-surface rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                <div class="p-6 border-b border-white/5 flex justify-between bg-white/5">
                    <h3 class="font-bold uppercase tracking-widest">Lịch Sử Vi Phạm</h3>
                    <button onclick="loadHistory()" class="material-symbols-outlined text-tertiary">refresh</button>
                </div>
                <table class="w-full text-left">
                    <thead class="bg-black/20 text-[10px] uppercase tracking-widest text-slate-500 font-bold">
                        <tr><th class="px-8 py-4">Thời Gian</th><th class="px-8 py-4">Thời Lượng</th><th class="px-8 py-4">Ảnh</th><th class="px-8 py-4"></th></tr>
                    </thead>
                    <tbody id="history-table" class="divide-y divide-white/5 text-sm"></tbody>
                </table>
            </div>
        </div>

        <!-- CONFIG -->
        <div id="tab-config" class="tab-content p-10 max-w-7xl mx-auto space-y-6">
            <div class="bg-surface p-8 rounded-3xl border border-white/5">
                <h3 class="font-bold uppercase tracking-widest mb-4">Vùng An Toàn Đa Giác</h3>
                <div class="relative inline-block border-4 border-tertiary/20 rounded-2xl overflow-hidden">
                    <img id="config-video-bg" src="" class="w-full max-w-4xl block" />
                    <canvas id="roi-canvas" class="absolute top-0 left-0 w-full h-full"></canvas>
                </div>
                <div class="mt-8 flex gap-4">
                    <button onclick="saveROI()" class="px-8 py-4 bg-tertiary text-black font-black uppercase rounded-xl">Lưu Cấu Hình</button>
                    <button onclick="clearROI()" class="px-8 py-4 bg-white/5 text-white rounded-xl">Xóa Điểm</button>
                </div>
            </div>
        </div>
    </main>

    <div id="image-modal" class="fixed inset-0 bg-black/95 z-[100] hidden flex items-center justify-center" onclick="this.classList.add('hidden')">
        <img id="modal-img" src="" class="max-w-full max-h-full p-10"/>
    </div>

    <div id="violation-hud" class="violation-hud flex items-center justify-center">
        <div class="bg-red-600 text-white p-10 rounded-2xl text-center shadow-2xl">
            <h2 class="text-5xl font-black italic uppercase font-headline">CẢNH BÁO</h2>
            <p class="mt-2 font-bold tracking-widest uppercase">Vi phạm an toàn lao động</p>
        </div>
    </div>

    <script>
        const socket = io();
        let currentTab = 'dashboard', roiPoints = [];
        const hud = document.getElementById('violation-hud'), vFeed = document.getElementById('video-feed'), cVideo = document.getElementById('config-video-bg'), nSignal = document.getElementById('no-signal');

        socket.on('stats_update', (data) => {
            if (!data) return;
            if (data.image) {
                const b64 = 'data:image/jpeg;base64,' + data.image;
                if (vFeed) vFeed.src = b64;
                if (currentTab === 'config' && cVideo) cVideo.src = b64;
            }

            if (currentTab === 'dashboard') {
                const count = data.workers_in_roi || 0;
                if (document.getElementById('worker-count')) document.getElementById('worker-count').innerText = count;
                if (document.getElementById('fps-display')) document.getElementById('fps-display').innerText = data.fps || '0.0';
                if (document.getElementById('missing-time')) document.getElementById('missing-time').innerText = (data.missing_time || 0) + 's';
                if (document.getElementById('time-bar')) document.getElementById('time-bar').style.width = Math.min(((data.missing_time || 0) / 5) * 100, 100) + '%';
                
                const disp = document.getElementById('status-display'), card = document.getElementById('status-card');
                if (nSignal) nSignal.style.display = data.camera_connected === false ? 'flex' : 'none';

                if (data.status === 'AN TOÀN') {
                    if (disp) { disp.innerText = 'AN TOÀN'; disp.style.color = '#00daf3'; }
                    if (card) card.style.borderColor = '#00daf3';
                    if (hud) hud.style.display = 'none';
                } else if (data.status) {
                    if (disp) { disp.innerText = data.status; disp.style.color = '#ffb4ab'; }
                    if (card) card.style.borderColor = '#ffb4ab';
                    if (hud) hud.style.display = data.status === 'CẢNH BÁO' ? 'flex' : 'none';
                }
            }
        });

        function showTab(id) {
            currentTab = id;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            const el = document.getElementById('tab-' + id);
            if (el) el.classList.add('active');
            const nav = document.getElementById('nav-' + id);
            if (nav) document.getElementById('tab-title').innerText = nav.innerText.trim();
            if (id === 'history') loadHistory();
            if (id === 'config') initCanvas();
        }

        async function loadHistory() {
            const container = document.getElementById('history-table');
            if (!container) return;
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                if (Array.isArray(data)) {
                    container.innerHTML = data.map(v => `
                        <tr class="border-b border-white/5">
                            <td class="px-8 py-4 text-slate-300">${v.time}</td>
                            <td class="px-8 py-4 text-red-400 font-bold">${v.duration}s</td>
                            <td class="px-8 py-4"><img src="/violations/${v.image}" class="h-10 rounded cursor-pointer" onclick="openModal('/violations/${v.image}')"/></td>
                            <td class="px-8 py-4"><button class="text-tertiary text-xs" onclick="openModal('/violations/${v.image}')">CHI TIẾT</button></td>
                        </tr>
                    `).join('');
                }
            } catch (err) { console.warn("Waiting for history..."); }
        }

        function openModal(s) { if (s) { document.getElementById('modal-img').src = s; document.getElementById('image-modal').classList.remove('hidden'); } }

        const canvas = document.getElementById('roi-canvas');
        const ctx = canvas ? canvas.getContext('2d') : null;

        function initCanvas() {
            if (!canvas || !cVideo) return;
            canvas.width = cVideo.clientWidth;
            canvas.height = cVideo.clientHeight;
            drawROI();
        }
        if (canvas) {
            canvas.onmousedown = (e) => {
                const r = canvas.getBoundingClientRect();
                if (e.button === 0) roiPoints.push([e.clientX - r.left, e.clientY - r.top]);
                else if (e.button === 2) roiPoints.pop();
                drawROI();
            };
            canvas.oncontextmenu = () => false;
        }

        function drawROI() {
            if (!ctx || !roiPoints.length) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#00daf3'; ctx.fillStyle = 'rgba(0, 218, 243, 0.2)'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(roiPoints[0][0], roiPoints[0][1]);
            roiPoints.forEach(p => ctx.lineTo(p[0], p[1]));
            if (roiPoints.length > 2) ctx.closePath();
            ctx.stroke(); ctx.fill();
        }
        function clearROI() { roiPoints = []; drawROI(); }
        async function saveROI() {
            if (!canvas) return;
            const scaled = roiPoints.map(p => [Math.round(p[0] * (640 / (canvas.width || 1))), Math.round(p[1] * (360 / (canvas.height || 1)))]);
            await fetch('/api/config_roi', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ points: scaled }) });
            alert('Đã lưu ROI!'); showTab('dashboard');
        }

        socket.on('connect', () => { console.log('Connected'); loadHistory(); });
        window.addEventListener('resize', initCanvas);
        loadHistory();
    </script>
</body>
</html>
