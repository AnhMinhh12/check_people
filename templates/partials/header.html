<!-- HEADER PARTIAL -->
<header class="sticky top-0 bg-white/80 backdrop-blur-2xl flex justify-between items-center px-6 lg:px-10 py-6 border-b border-slate-100 z-40">
    <div class="flex flex-col">
        <h2 id="tab-title" class="text-3xl font-black tracking-tight text-slate-800 font-headline uppercase italic">TỔNG QUAN <span class="text-primary not-italic tracking-tighter">AI</span></h2>
        <div class="flex items-center gap-2 mt-1 px-3 py-1 bg-slate-50 w-fit rounded-full border border-slate-100">
            <span class="material-symbols-outlined text-xs text-secondary font-bold">radar</span>
            <span id="focused-cam-name" class="text-[9px] font-black text-slate-500 uppercase tracking-widest">Trực tiếp toàn hệ thống</span>
        </div>
    </div>
    
    <div class="flex items-center gap-5">
        <div class="hidden sm:flex items-center gap-3 px-5 py-2.5 bg-slate-50 rounded-2xl border border-slate-100/50 shadow-inner">
            <div class="relative flex items-center justify-center">
                <span class="h-2.5 w-2.5 rounded-full bg-secondary"></span>
                <span class="absolute h-4 w-4 rounded-full bg-secondary opacity-20 animate-ping"></span>
            </div>
            <div class="flex flex-col">
                <span class="text-[9px] font-black uppercase tracking-tighter text-slate-400 leading-none">Máy chủ an ninh</span>
                <span class="text-[10px] font-bold text-slate-700 leading-none mt-1">Trạng thái: Trực tuyến</span>
            </div>
        </div>
        
        <div class="h-12 w-12 bg-white rounded-2xl border border-slate-100 shadow-sm flex items-center justify-center hover:bg-slate-50 cursor-pointer transition-all">
            <span class="material-symbols-outlined text-slate-400">notifications</span>
        </div>
    </div>
</header>
