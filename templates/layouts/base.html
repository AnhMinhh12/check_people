<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Warden AI Enterprise{% endblock %}</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&display=swap" rel="stylesheet" />
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3b82f6",     /* Blue 500 */
                        "secondary": "#10b981",   /* Emerald 500 */
                        "accent": "#f59e0b",      /* Amber 500 */
                        "danger": "#ef4444",      /* Red 500 */
                        "background": "#f0f4f9",  /* Softer Light Gray/Blue */
                        "surface": "#ffffff",
                        "text-main": "#334155",   /* Slate 700 */
                        "text-muted": "#64748b"   /* Slate 500 */
                    },
                    fontFamily: {
                        "headline": ["Outfit", "sans-serif"],
                        "body": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "4xl": "2rem",
                        "5xl": "3rem"
                    }
                }
            }
        };
    </script>
    
    <style>
        body {
            background-color: #f0f4f9;
            color: #334155;
            -webkit-font-smoothing: antialiased;
        }

        .smooth-transition {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        .camera-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .camera-card:hover {
            transform: translateY(-8px);
            border-color: #3b82f6;
            box-shadow: 0 20px 40px -12px rgba(59, 130, 246, 0.15);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="font-body selection:bg-primary/20">
    <div class="flex">
        {% include 'partials/sidebar.html' %}
        
        <main class="flex-1 ml-20 lg:ml-64 min-h-screen">
            {% include 'partials/header.html' %}
            
            <div class="p-6 lg:p-10">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    {% include 'partials/modals.html' %}
    {% block scripts %}{% endblock %}
</body>
</html>
