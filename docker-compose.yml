services:
  warden-app:
    # Build trực tiếp từ Dockerfile cục bộ để cập nhật thay đổi code
    build: .
    image: warden-ai:local
    container_name: sentinel-warden-v5-enterprise
    restart: always
    ports:
      - "5000:5000"
    volumes:
      # Sơ đồ Volumes HTMP_AI_Systems: Mount từng module riêng biệt
      - ./.env:/app/.env
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      # Module code (hot-reload khi dev)
      - ./app:/app/app
      - ./core:/app/core
      - ./db:/app/db
      - ./services:/app/services
      - ./pipelines:/app/pipelines
      - ./events:/app/events
      - ./integrations:/app/integrations
      - ./templates:/app/templates
      # Không gắn ./:/app trực tiếp để tránh xung đột venv giữa Windows/Linux
    environment:
      - TZ=Asia/Ho_Chi_Minh
      - FLASK_DEBUG=False
      # Ép OpenCV/FFMPEG sử dụng giao thức TCP thay vì UDP để ổn định hơn trong Docker
      - OPENCV_FFMPEG_CAPTURE_OPTIONS=rtsp_transport;tcp
      - PYTHONUNBUFFERED=1

    # Giới hạn tài nguyên để container không chiếm dụng quá mức (Tùy chọn)
    # mem_limit: 4g
    # cpus: '4.0'

    # Tăng bộ nhớ đệm cho Container để xử lý nén/giải nén luồng Camera nặng
    shm_size: '2gb'
    # Cho phép truy cập phần cứng sâu hơn (ví dụ để dùng Camera USB nếu có)
    privileged: true

    # Cơ chế tự động kiểm tra trạng thái container
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
